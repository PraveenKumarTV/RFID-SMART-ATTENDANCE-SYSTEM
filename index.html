<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Queens Puzzle</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #121212, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none; /* Prevent text selection while playing */
            min-height: 100vh;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Chessboard Grid */
        #board {
            display: grid;
            border: 4px solid #343a40;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #343a40;
            gap: 1px; /* Creates grid lines */
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 3rem);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* Target colors - professional/modern palette */
        .target-color-0 { background-color: #0a66c2 !important; } /* LinkedIn Blue */
        .target-color-1 { background-color: #5f5f5f !important; } /* Slate Gray */
        .target-color-2 { background-color: #6a4c93 !important; } /* Amethyst */
        .target-color-3 { background-color: #1982c4 !important; } /* Cerulean */
        .target-color-4 { background-color: #8ac926 !important; } /* Apple Green */
        .target-color-5 { background-color: #ffca3a !important; } /* Sunglow Yellow */
        .target-color-6 { background-color: #ff595e !important; } /* Coral Red */
        .target-color-7 { background-color: #ca6702 !important; } /* Tiger Orange */
        .target-color-8 { background-color: #bb3e03 !important; } /* Rust */
        .target-color-9 { background-color: #006d77 !important; } /* Teal */
        
        /* Interactive States */
        .square:hover {
            opacity: 0.8;
        }

        .queen {
            color: white; /* For better contrast on colored squares */
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7); /* Darker shadow for contrast */
        }

    .cross {
        color: rgba(255, 255, 255, 0.4);
        font-size: clamp(1rem, 3vw, 2rem);
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        pointer-events: none;
    }

        .conflict {
            background-color: #dc3545 !important; /* Bootstrap Danger Red */
            animation: shake 0.4s;
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        .stats-badge {
            font-size: 1.1rem;
            padding: 10px 15px;
        }
    </style>
</head>
<body>

<div class="container py-4 game-container">
    <div class="text-center mb-4">
        <h1 class="display-5 fw-bold text-primary">N-Queens Puzzle</h1>
        <p class="text-muted">Place <span id="n-count">4</span> queens so no two attack each other, with exactly one in each colored region.</p>
    </div>

    <!-- Stats Dashboard -->
    <div class="d-flex justify-content-between mb-3">
        <span class="badge bg-secondary stats-badge">Level: <span id="level-display">4</span></span>
        <span class="badge bg-info text-dark stats-badge">Queens: <span id="queens-count">0</span> / <span id="queens-target">4</span></span>
        <span class="badge bg-warning text-dark stats-badge">Time: <span id="time-display">0:00</span></span>
    </div>

    <!-- Game Board -->
    <div id="board" class="mb-4"></div>

    <!-- Controls -->
    <div class="d-flex justify-content-center gap-2">
        <button class="btn btn-outline-danger" onclick="clearBoard()">Clear Board</button>
        <button class="btn btn-outline-light" onclick="resetGame()">Restart Level</button>
    </div>
</div>

<!-- Victory Modal -->
<div class="modal fade" id="victoryModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center">
            <div class="modal-header border-0 justify-content-center">
                <h2 class="modal-title text-success fw-bold">Level Cleared! 🎉</h2>
            </div>
            <div class="modal-body">
                <p class="fs-5">You successfully placed all <span id="modal-n-count"></span> queens!</p>
                <p>Time: <strong id="modal-time"></strong> | Moves: <strong id="modal-moves"></strong></p>
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-primary btn-lg px-5" onclick="nextLevel()">Next Level</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Game Logic -->
<script>
    let N = 4; // Start level
    let maxLevel = 10;
    let queens = []; // Stores {r, c} of placed queens
    let moves = 0;
    let cellColors = []; // Stores the color region index for each cell
    
    // Timer variables
    let timerInterval;
    let secondsElapsed = 0;
    let isTimerRunning = false;

    const boardElement = document.getElementById('board');
    const victoryModal = new bootstrap.Modal(document.getElementById('victoryModal'));

    // Generate a valid N-Queens solution to guarantee a winnable board
    function getRandomSolution(size) {
        let board = new Array(size).fill(-1);
        let found = false;
        let solution = null;

        function isSafe(row, col) {
            for (let i = 0; i < row; i++) {
                if (board[i] === col || Math.abs(board[i] - col) === Math.abs(i - row)) return false;
            }
            return true;
        }

        function solve(row) {
            if (found) return;
            if (row === size) {
                found = true;
                solution = [...board];
                return;
            }
            // Randomize column checking order
            let cols = Array.from({length: size}, (_, i) => i).sort(() => Math.random() - 0.5);
            for (let col of cols) {
                if (isSafe(row, col)) {
                    board[row] = col;
                    solve(row + 1);
                }
            }
        }
        solve(0);
        return solution.map((col, row) => ({ r: row, c: col }));
    }

    // Partition the board into N colored regions ensuring 1 solution point per region
    function generateRegions() {
        let solution = getRandomSolution(N);
        cellColors = Array.from({ length: N }, () => new Array(N).fill(-1));
        
        let queues = [];
        for (let i = 0; i < N; i++) {
            cellColors[solution[i].r][solution[i].c] = i;
            queues.push([{ r: solution[i].r, c: solution[i].c }]);
        }
        
        let unassignedCount = N * N - N;
        const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
        let loopLimit = 10000; // Failsafe
        
        // Flood fill to grow regions
        while (unassignedCount > 0 && loopLimit > 0) {
            loopLimit--;
            let expandedAny = false;
            let regions = Array.from({length: N}, (_, i) => i).sort(() => Math.random() - 0.5);
            
            for (let i of regions) {
                let q = queues[i];
                if (q.length === 0) continue;
                
                let cellIndex = Math.floor(Math.random() * q.length);
                let cell = q[cellIndex];
                let shuffledDirs = [...dirs].sort(() => Math.random() - 0.5);
                let expanded = false;
                
                for (let d of shuffledDirs) {
                    let nr = cell.r + d[0];
                    let nc = cell.c + d[1];
                    
                    if (nr >= 0 && nr < N && nc >= 0 && nc < N && cellColors[nr][nc] === -1) {
                        cellColors[nr][nc] = i;
                        q.push({ r: nr, c: nc });
                        unassignedCount--;
                        expanded = true;
                        expandedAny = true;
                        break; // Expand one cell per region per turn
                    }
                }
                
                if (!expanded) {
                    q.splice(cellIndex, 1); // Remove stuck frontier cells
                }
            }
            
            // Fallback for isolated cells (holes)
            if (!expandedAny && unassignedCount > 0) {
                for (let r = 0; r < N; r++) {
                    for (let c = 0; c < N; c++) {
                        if (cellColors[r][c] === -1) {
                            for (let d of dirs) {
                                let nr = r + d[0], nc = c + d[1];
                                if (nr >= 0 && nr < N && nc >= 0 && nc < N && cellColors[nr][nc] !== -1) {
                                    cellColors[r][c] = cellColors[nr][nc];
                                    queues[cellColors[nr][nc]].push({r, c});
                                    unassignedCount--;
                                    break;
                                }
                            }
                        }
                    }
                }
            }
        }
    }

    // Initialize Game
    function initGame() {
        queens = [];
        moves = 0;
        secondsElapsed = 0;
        isTimerRunning = false;
        clearInterval(timerInterval);
        
        generateRegions();
        updateStatsUI();
        createBoardUI();
    }

    // Generate HTML Board
    function createBoardUI() {
        boardElement.innerHTML = '';
        boardElement.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
        boardElement.style.gridTemplateRows = `repeat(${N}, 1fr)`;

        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                const square = document.createElement('div');
                square.classList.add('square');
                square.classList.add(`target-color-${cellColors[r][c]}`);
                
                square.dataset.row = r;
                square.dataset.col = c;
                square.addEventListener('click', () => handleSquareClick(r, c));
                
                boardElement.appendChild(square);
            }
        }
    }

    // Handle Player Move
    function handleSquareClick(r, c) {
        if (!isTimerRunning) startTimer();

        const existingIndex = queens.findIndex(q => q.r === r && q.c === c);

        if (existingIndex !== -1) {
            // Remove queen
            queens.splice(existingIndex, 1);
        } else {
            // Place queen if limit not reached
            if (queens.length < N) {
                queens.push({ r, c });
                moves++;
            } else {
                // Flash board to indicate limit reached
                boardElement.classList.add('conflict');
                setTimeout(() => boardElement.classList.remove('conflict'), 200);
                return;
            }
        }
        
        renderQueens();
        checkGameState();
    }

    // Render Queens and Conflicts
    function renderQueens() {
        // Clear all states
        document.querySelectorAll('.square').forEach(sq => {
            sq.innerHTML = '';
            sq.classList.remove('conflict');
        });

        const conflicts = findConflicts();

        // Mark attacked cells with a cross
        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                // Skip if there's a queen here
                if (queens.some(q => q.r === r && q.c === c)) continue;
                
                // Check if attacked by any queen (including same color region)
                let isAttacked = queens.some(q => {
                    return q.r === r || q.c === c || Math.abs(q.r - r) === Math.abs(q.c - c) || cellColors[q.r][q.c] === cellColors[r][c];
                });

                if (isAttacked) {
                    const square = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
                    square.innerHTML = '<span class="cross">✕</span>';
                }
            }
        }

        queens.forEach((q, index) => {
            const square = document.querySelector(`.square[data-row="${q.r}"][data-col="${q.c}"]`);
            square.innerHTML = '<span class="queen">♛</span>';
            
            // Highlight if in conflict
            if (conflicts.includes(index)) {
                square.classList.add('conflict');
            }
        });
        
        updateStatsUI();
    }

    // Logic: Identify conflicting queens
    function findConflicts() {
        let conflictIndices = new Set();
        for (let i = 0; i < queens.length; i++) {
            for (let j = i + 1; j < queens.length; j++) {
                let q1 = queens[i];
                let q2 = queens[j];
                
                let color1 = cellColors[q1.r][q1.c];
                let color2 = cellColors[q2.r][q2.c];
                
                // Same row, same col, same diagonal, OR same color region
                if (q1.r === q2.r || 
                    q1.c === q2.c || 
                    Math.abs(q1.r - q2.r) === Math.abs(q1.c - q2.c) || 
                    color1 === color2) {
                    
                    conflictIndices.add(i);
                    conflictIndices.add(j);
                }
            }
        }
        return Array.from(conflictIndices);
    }

    // Check Win Condition
    function checkGameState() {
        if (queens.length === N && findConflicts().length === 0) {
            clearInterval(timerInterval);
            
            // Wait slightly for the final queen animation to render
            setTimeout(() => {
                document.getElementById('modal-n-count').innerText = N;
                document.getElementById('modal-time').innerText = formatTime(secondsElapsed);
                document.getElementById('modal-moves').innerText = moves;
                victoryModal.show();
            }, 300);
        }
    }

    // UI Updates
    function updateStatsUI() {
        document.getElementById('n-count').innerText = N;
        document.getElementById('level-display').innerText = N;
        document.getElementById('queens-count').innerText = queens.length;
        document.getElementById('queens-target').innerText = N;
        document.getElementById('time-display').innerText = formatTime(secondsElapsed);
    }

    // Timer Logic
    function startTimer() {
        isTimerRunning = true;
        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('time-display').innerText = formatTime(secondsElapsed);
        }, 1000);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // Control Buttons
    function clearBoard() {
        queens = [];
        renderQueens();
    }

    function resetGame() {
        initGame();
    }

    function nextLevel() {
        victoryModal.hide();
        if (N < maxLevel) {
            N++;
        }
        initGame();
    }

    // Start App
    initGame();

</script>
</body>
</html>
